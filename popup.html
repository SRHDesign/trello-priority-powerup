<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Priority</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e8e8f0;
      padding: 12px;
      min-height: 100vh;
    }

    .priority-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .priority-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: #e8e8f0;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
      transition: background 0.15s, transform 0.1s;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .priority-btn:hover {
      background: rgba(255,255,255,0.12);
      transform: translateX(2px);
    }

    .priority-btn.active {
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.14);
    }

    .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px currentColor;
    }

    .priority-num {
      font-size: 11px;
      opacity: 0.5;
      margin-left: auto;
      font-family: monospace;
    }

    .clear-btn {
      margin-top: 10px;
      padding: 8px;
      width: 100%;
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.2);
      border-radius: 8px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }

    .clear-btn:hover {
      border-color: rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <div class="priority-list" id="priorityList">
    <p style="opacity:0.5; font-size:13px;">Loading…</p>
  </div>
  <button class="clear-btn" id="clearBtn">✕ Clear priority</button>

  <script>
    const DEFAULT_PRIORITIES = [
      { id: 1, label: 'Urgent', color: '#E53E3E' },
      { id: 2, label: 'High',   color: '#DD6B20' },
      { id: 3, label: 'Medium', color: '#D69E2E' },
      { id: 4, label: 'Low',    color: '#38A169' },
      { id: 5, label: 'None',   color: '#718096' },
    ];

    const t = TrelloPowerUp.iframe();

    async function render() {
      const [priorities, currentPriority] = await Promise.all([
        t.get('board', 'shared', 'priorities').then(p => p || DEFAULT_PRIORITIES),
        t.get('card', 'shared', 'priority'),
      ]);

      const list = document.getElementById('priorityList');
      list.innerHTML = '';

      priorities.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'priority-btn' + (currentPriority === p.id ? ' active' : '');
        btn.innerHTML = `
          <span class="color-dot" style="background:${p.color};"></span>
          <span>${p.label}</span>
          <span class="priority-num">P${p.id}</span>
        `;
        btn.addEventListener('click', async () => {
          await t.set('card', 'shared', 'priority', p.id);
          t.closePopup();
        });
        list.appendChild(btn);
      });
    }

    document.getElementById('clearBtn').addEventListener('click', async () => {
      await t.remove('card', 'shared', 'priority');
      t.closePopup();
    });

    render();
  </script>
</body>
</html>
