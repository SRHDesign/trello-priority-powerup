<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Priority Power-Up</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
  const DEFAULT_PRIORITIES = [
    { id: 1, label: 'Urgent', color: '#E53E3E' },
    { id: 2, label: 'High',   color: '#DD6B20' },
    { id: 3, label: 'Medium', color: '#D69E2E' },
    { id: 4, label: 'Low',    color: '#38A169' },
    { id: 5, label: 'None',   color: '#718096' },
  ];

  async function getPriorities(t) {
    const stored = await t.get('board', 'shared', 'priorities');
    return stored || DEFAULT_PRIORITIES;
  }

  TrelloPowerUp.initialize({

    // ── Card Badges (visible on card face in board view) ──────────────────
    'card-badges': async function(t) {
      const priorityId = await t.get('card', 'shared', 'priority');
      if (!priorityId) return [];
      const priorities = await getPriorities(t);
      const p = priorities.find(x => x.id === priorityId);
      if (!p) return [];
      return [{
        text: p.label,
        color: priorityBadgeColor(p.color),
      }];
    },

    // ── Card Detail Badges (visible when card is opened) ──────────────────
    'card-detail-badges': async function(t) {
      const priorityId = await t.get('card', 'shared', 'priority');
      if (!priorityId) return [];
      const priorities = await getPriorities(t);
      const p = priorities.find(x => x.id === priorityId);
      if (!p) return [];
      return [{
        title: 'Priority',
        text: `${p.id}. ${p.label}`,
        color: priorityBadgeColor(p.color),
      }];
    },

    // ── Card Buttons (appear inside the card back panel) ──────────────────
    'card-buttons': function(t) {
      return [{
        icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.263.0/icons/flag.svg',
        text: 'Set Priority',
        callback: function(t) {
          return t.popup({
            title: 'Set Priority',
            url: './popup.html',
            height: 320,
          });
        },
      }];
    },

    // ── Board Buttons (top-right of the board) ────────────────────────────
    'board-buttons': function(t) {
      return [{
        icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.263.0/icons/settings.svg',
        text: 'Priority Settings',
        callback: function(t) {
          return t.popup({
            title: 'Priority Settings',
            url: './settings.html',
            height: 420,
          });
        },
      }];
    },

  });

  // Map hex color → Trello badge color name (closest match)
  function priorityBadgeColor(hex) {
    // Trello supports: 'red','orange','yellow','green','blue','purple','pink','sky','lime','light-gray','business-class','default','null'
    const map = {
      '#E53E3E': 'red',    '#C53030': 'red',
      '#DD6B20': 'orange', '#C05621': 'orange',
      '#D69E2E': 'yellow', '#B7791F': 'yellow',
      '#38A169': 'green',  '#276749': 'green',
      '#3182CE': 'blue',   '#2B6CB0': 'blue',
      '#805AD5': 'purple', '#6B46C1': 'purple',
      '#D53F8C': 'pink',   '#B83280': 'pink',
      '#0BC5EA': 'sky',    '#00B5D8': 'sky',
      '#68D391': 'lime',
    };
    return map[hex] || 'default';
  }
</script>
</body>
</html>
